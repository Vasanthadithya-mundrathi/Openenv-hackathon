name: Keep Hugging Face Space Awake

on:
  schedule:
    # Runs once a day to prevent the Space from going to sleep after 48 hours of inactivity
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space Health Endpoint
        run: |
          echo "Pinging the Hugging Face Space..."
          curl -f -s https://vasanthfeb13-soc-triage-env.hf.space/health || echo "Ping failed (Space might be waking up or busy, but the ping still sends activity)."
